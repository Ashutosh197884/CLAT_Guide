services:
  - type: web
    name: lexai-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lexai-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: NVIDIA_API_KEY
        sync: false
      - key: CHROMA_PATH
        value: backend/data/chroma
      - key: EMBEDDING_MODEL_NAME
        value: all-MiniLM-L6-v2
      - key: PYTHON_VERSION
        value: 3.10.14

databases:
  - name: lexai-db
    plan: free
